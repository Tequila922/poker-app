<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="All in Night">
    <title>All in Night - 德州扑克升盲应用</title>
    <style>
        :root {
            --bg-primary: #0d0d0d;
            --bg-secondary: #1a1a1a;
            --bg-card: #1e1e1e;
            --bg-card-alt: #252525;
            --gold: #c9a84c;
            --gold-light: #e0c56e;
            --gold-dark: #a07d2e;
            --text-primary: #f0e6d3;
            --text-secondary: #b8a88a;
            --text-muted: #7a6f5d;
            --accent-red: #c0392b;
            --accent-green: #27ae60;
            --accent-blue: #2980b9;
            --border-color: #333;
            --danger: #e74c3c;
            --danger-hover: #c0392b;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
            --safe-top: env(safe-area-inset-top, 0px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: var(--bg-primary);
            background-image:
                radial-gradient(ellipse at center, rgba(30, 25, 15, 0.9) 0%, rgba(10, 8, 5, 0.98) 100%),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 255, 255, 0.003) 2px, rgba(255, 255, 255, 0.003) 4px);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 12px 16px 24px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: -webkit-fill-available;
        }

        /* ========== 标题区域 ========== */
        .header {
            text-align: center;
            padding: 18px 0 10px;
            position: relative;
        }

        .header-title {
            font-size: clamp(2rem, 6vw, 3.2rem);
            font-weight: 900;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            background: linear-gradient(180deg,
                    #f7d774 0%,
                    #c9a84c 25%,
                    #e8c860 40%,
                    #b8942e 60%,
                    #d4af4a 75%,
                    #f0d068 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            filter: drop-shadow(0 2px 4px rgba(200, 160, 60, 0.5));
            line-height: 1.1;
            display: inline-block;
            position: relative;
        }

        .header-title::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            border-radius: 50%;
        }

        .header-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.15em;
            margin-top: 4px;
            text-transform: uppercase;
        }

        /* ========== 主布局 ========== */
        .main-content {
            display: flex;
            gap: 16px;
            flex: 1;
            margin-top: 8px;
        }

        @media (max-width: 640px) {
            .main-content {
                flex-direction: column;
                gap: 12px;
            }
        }

        /* ========== 左侧面板 - 盲注控制 ========== */
        .left-panel {
            flex: 0 0 280px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 240px;
        }

        @media (max-width: 640px) {
            .left-panel {
                flex: 0 0 auto;
                min-width: auto;
            }
        }

        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px 18px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(200, 160, 60, 0.3), transparent);
            opacity: 0.6;
        }

        .level-display {
            text-align: center;
            padding: 4px 0;
        }

        .level-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 2px;
        }

        .level-number {
            font-size: 2.4rem;
            font-weight: 800;
            color: var(--gold-light);
            line-height: 1;
            letter-spacing: 0.03em;
        }

        .blinds-display {
            text-align: center;
            padding: 10px 0;
            background: var(--bg-card-alt);
            border-radius: 12px;
            margin: 4px 0;
            border: 2px solid rgba(200, 160, 60, 0.25);
            position: relative;
        }

        .blinds-value {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.04em;
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
        }

        .blinds-label-sm {
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* 倒计时显示 */
        .timer-display {
            text-align: center;
            padding: 8px 0;
        }

        .timer-value {
            font-size: 3.2rem;
            font-weight: 900;
            font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
            color: #fff;
            letter-spacing: 0.06em;
            transition: color 0.3s;
            font-variant-numeric: tabular-nums;
        }

        .timer-value.warning {
            color: #f39c12;
            animation: pulse-warning 0.8s ease-in-out infinite;
        }

        .timer-value.danger {
            color: #e74c3c;
            animation: pulse-danger 0.5s ease-in-out infinite;
        }

        @keyframes pulse-warning {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }
        @keyframes pulse-danger {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        .timer-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* 按钮组 */
        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 60px;
            padding: 11px 10px;
            border-radius: 10px;
            border: 1px solid transparent;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: all 0.2s;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            position: relative;
            overflow: hidden;
            font-family: inherit;
        }

        .btn:active {
            transform: scale(0.96);
            transition: transform 0.1s;
        }

        .btn-start {
            background: var(--accent-green);
            color: #fff;
            border-color: #2ecc71;
            box-shadow: 0 2px 8px rgba(39, 174, 96, 0.3);
        }
        .btn-start:active {
            background: #219a52;
            box-shadow: 0 1px 4px rgba(39, 174, 96, 0.2);
        }
        .btn-start.running {
            background: #f39c12;
            border-color: #f1c40f;
            box-shadow: 0 2px 8px rgba(243, 156, 18, 0.3);
            color: #1a1a1a;
        }
        .btn-start.running:active {
            background: #d68910;
        }

        .btn-reset {
            background: transparent;
            color: var(--text-secondary);
            border-color: var(--border-color);
        }
        .btn-reset:active {
            background: rgba(255, 255, 255, 0.06);
        }

        .btn-add-player {
            background: transparent;
            color: var(--gold-light);
            border-color: rgba(200, 160, 60, 0.4);
            font-size: 0.85rem;
            letter-spacing: 0.06em;
        }
        .btn-add-player:active {
            background: rgba(200, 160, 60, 0.1);
            border-color: rgba(200, 160, 60, 0.7);
        }

        .btn-skip {
            background: transparent;
            color: #e67e22;
            border-color: rgba(230, 126, 34, 0.4);
            font-size: 0.8rem;
        }
        .btn-skip:active {
            background: rgba(230, 126, 34, 0.1);
        }

        /* ========== 右侧面板 - 选手积分榜 ========== */
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 200px;
        }

        .leaderboard-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4px 4px;
        }

        .leaderboard-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-secondary);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .leaderboard-title .trophy-icon {
            font-size: 1.1rem;
        }

        .player-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            overflow-y: auto;
            max-height: 55vh;
            padding-right: 4px;
            -webkit-overflow-scrolling: touch;
        }

        @media (max-width: 640px) {
            .player-list {
                max-height: 35vh;
            }
        }

        .player-list::-webkit-scrollbar {
            width: 3px;
        }
        .player-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .player-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .player-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-card);
            border-radius: 12px;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
            position: relative;
            animation: fadeInRow 0.3s ease-out;
        }

        @keyframes fadeInRow {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .player-row.top-player {
            border-color: rgba(200, 160, 60, 0.5);
            background: linear-gradient(135deg, #1e1e1e 0%, #1a1810 100%);
            box-shadow: 0 0 20px rgba(200, 160, 60, 0.1);
        }

        .player-row.top-player::after {
            content: '';
            position: absolute;
            top: -1px;
            left: 20px;
            right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(200, 160, 60, 0.6), transparent);
            border-radius: 50%;
        }

        .player-avatar-wrap {
            flex: 0 0 42px;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: border-color 0.3s;
            background: var(--bg-card-alt);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-avatar-wrap:active {
            border-color: var(--gold-light);
            transform: scale(0.95);
        }

        .player-avatar-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .player-avatar-placeholder {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            pointer-events: none;
        }

        .player-avatar-upload-hint {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 16px;
            height: 16px;
            background: var(--gold-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            color: #fff;
            border: 2px solid var(--bg-card);
            pointer-events: none;
            opacity: 0.85;
        }

        .player-info {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .player-name-input {
            background: transparent;
            border: none;
            border-bottom: 1px dashed transparent;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-weight: 500;
            padding: 3px 4px;
            width: auto;
            min-width: 50px;
            max-width: 110px;
            outline: none;
            font-family: inherit;
            letter-spacing: 0.03em;
            transition: border-color 0.3s;
            border-radius: 2px;
        }

        .player-name-input:focus {
            border-bottom-color: var(--gold-light);
            background: rgba(255, 255, 255, 0.03);
        }

        .player-name-input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .championship-control {
            display: flex;
            align-items: center;
            gap: 3px;
            background: rgba(200, 160, 60, 0.08);
            border-radius: 8px;
            padding: 3px 7px;
            flex-shrink: 0;
        }

        .trophy-icon-sm {
            font-size: 1rem;
            flex-shrink: 0;
        }

        .champ-count {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--gold-light);
            min-width: 18px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        .champ-btn {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 1px solid rgba(200, 160, 60, 0.35);
            background: transparent;
            color: var(--gold-light);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            padding: 0;
            line-height: 1;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .champ-btn:active {
            background: rgba(200, 160, 60, 0.25);
            transform: scale(0.9);
        }

        .btn-delete-player {
            flex: 0 0 28px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .btn-delete-player:active {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border-color: rgba(231, 76, 60, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 30px 16px;
            color: var(--text-muted);
            font-size: 0.85rem;
            letter-spacing: 0.04em;
            opacity: 0.7;
        }

        /* ========== Toast 提示 ========== */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #222;
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            z-index: 1000;
            pointer-events: none;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid var(--gold-dark);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            white-space: nowrap;
            max-width: 90vw;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        .toast.level-up {
            background: #1a1000;
            border-color: var(--gold);
            color: var(--gold-light);
            font-size: 1rem;
            padding: 14px 24px;
            border-radius: 24px;
        }

        /* ========== 升级动画覆盖层 ========== */
        .level-up-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .level-up-overlay.active {
            opacity: 1;
        }
        .level-up-badge {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid var(--gold);
            border-radius: 20px;
            padding: 20px 30px;
            text-align: center;
            transform: scale(0.5);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .level-up-overlay.active .level-up-badge {
            transform: scale(1);
        }
        .level-up-badge .lvl-text {
            font-size: 1rem;
            color: var(--gold-light);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .level-up-badge .lvl-blinds {
            font-size: 2rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.05em;
            margin-top: 4px;
        }

        /* ========== 响应式微调 ========== */
        @media (max-width: 380px) {
            .left-panel {
                flex: 0 0 auto;
            }
            .timer-value {
                font-size: 2.6rem;
            }
            .blinds-value {
                font-size: 1.6rem;
            }
            .level-number {
                font-size: 2rem;
            }
            .btn {
                padding: 10px 6px;
                font-size: 0.78rem;
            }
            .player-name-input {
                max-width: 70px;
                font-size: 0.8rem;
            }
            .player-avatar-wrap {
                flex: 0 0 34px;
                width: 34px;
                height: 34px;
            }
        }

        @media (min-width: 641px) and (max-width: 768px) {
            .left-panel {
                flex: 0 0 240px;
                min-width: 220px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 标题区域 -->
        <header class="header">
            <h1 class="header-title">All in Night</h1>
            <p class="header-subtitle">Texas Hold'em Blind Timer</p>
        </header>

        <!-- 主内容区域 -->
        <div class="main-content">
            <!-- 左侧面板 - 盲注控制 -->
            <div class="left-panel">
                <div class="card">
                    <div class="level-display">
                        <div class="level-label">当前级别</div>
                        <div class="level-number" id="levelNumber">1</div>
                        <div style="font-size:0.7rem;color:var(--text-muted);">/ 15</div>
                    </div>
                    <div class="blinds-display">
                        <div class="blinds-label-sm">Small Blind / Big Blind</div>
                        <div class="blinds-value" id="blindsValue">100 / 200</div>
                    </div>
                    <div class="timer-display">
                        <div class="timer-label">倒计时</div>
                        <div class="timer-value" id="timerValue">05:00</div>
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-start" id="btnStart" title="开始/暂停倒计时">▶ 开始</button>
                    <button class="btn btn-reset" id="btnReset" title="重置到第1级别">↺ 重置</button>
                </div>
                <div class="btn-group">
                    <button class="btn btn-skip" id="btnSkip" title="跳过当前级别">⏭ 跳过级别</button>
                </div>
                <button class="btn btn-add-player" id="btnAddPlayer" title="添加新选手">+ 添加选手</button>
            </div>

            <!-- 右侧面板 - 最强王者 -->
            <div class="right-panel">
                <div class="leaderboard-header">
                    <span class="leaderboard-title">
                        <span class="trophy-icon">🏆</span> 最强王者
                    </span>
                    <span style="font-size:0.7rem;color:var(--text-muted);" id="playerCount">0 位选手</span>
                </div>
                <div class="player-list" id="playerList">
                    <div class="empty-state">暂无选手，点击"+ 添加选手"开始</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- 升级覆盖层 -->
    <div class="level-up-overlay" id="levelUpOverlay">
        <div class="level-up-badge">
            <div class="lvl-text">Level Up! ⬆</div>
            <div class="lvl-blinds" id="levelUpBlinds">100 / 200</div>
        </div>
    </div>

    <!-- 隐藏的文件上传input -->
    <input type="file" accept="image/*" id="avatarFileInput" style="display:none;">

    <script>
        (function() {
            // ==================== 盲注级别定义（15个级别） ====================
            const BLIND_LEVELS = [
                { level: 1, small: 100, big: 200 },
                { level: 2, small: 200, big: 400 },
                { level: 3, small: 300, big: 600 },
                { level: 4, small: 400, big: 800 },
                { level: 5, small: 500, big: 1000 },
                { level: 6, small: 600, big: 1200 },
                { level: 7, small: 800, big: 1600 },
                { level: 8, small: 1000, big: 2000 },
                { level: 9, small: 1500, big: 3000 },
                { level: 10, small: 2000, big: 4000 },
                { level: 11, small: 3000, big: 6000 },
                { level: 12, small: 4000, big: 8000 },
                { level: 13, small: 5000, big: 10000 },
                { level: 14, small: 6000, big: 12000 },
                { level: 15, small: 8000, big: 16000 },
            ];

            const TOTAL_LEVELS = BLIND_LEVELS.length;
            const LEVEL_DURATION_SECONDS = 5 * 60; // 5分钟 = 300秒

            // ==================== DOM 元素 ====================
            const $levelNumber = document.getElementById('levelNumber');
            const $blindsValue = document.getElementById('blindsValue');
            const $timerValue = document.getElementById('timerValue');
            const $btnStart = document.getElementById('btnStart');
            const $btnReset = document.getElementById('btnReset');
            const $btnSkip = document.getElementById('btnSkip');
            const $btnAddPlayer = document.getElementById('btnAddPlayer');
            const $playerList = document.getElementById('playerList');
            const $playerCount = document.getElementById('playerCount');
            const $toast = document.getElementById('toast');
            const $levelUpOverlay = document.getElementById('levelUpOverlay');
            const $levelUpBlinds = document.getElementById('levelUpBlinds');
            const $avatarFileInput = document.getElementById('avatarFileInput');

            // ==================== 状态 ====================
            let currentLevelIndex = 0; // 0-based
            let remainingSeconds = LEVEL_DURATION_SECONDS;
            let isRunning = false;
            let timerInterval = null;
            let players = [];
            let editingAvatarForPlayerId = null;
            let toastTimeout = null;
            let levelUpOverlayTimeout = null;

            // ==================== 本地存储 ====================
            const STORAGE_KEY = 'all_in_night_data_v2';

            function saveData() {
                const data = {
                    currentLevelIndex,
                    remainingSeconds,
                    isRunning: false, // 始终以暂停状态保存
                    players: players.map(p => ({
                        id: p.id,
                        name: p.name,
                        avatar: p.avatar, // base64
                        championships: p.championships,
                    })),
                    savedAt: Date.now(),
                };
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                } catch (e) {
                    console.warn('无法保存数据到localStorage:', e.message);
                    showToast('⚠️ 存储空间不足，请清理旧数据');
                }
            }

            function loadData() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (!raw) return false;
                    const data = JSON.parse(raw);
                    if (data.currentLevelIndex !== undefined &&
                        data.currentLevelIndex >= 0 &&
                        data.currentLevelIndex < TOTAL_LEVELS) {
                        currentLevelIndex = data.currentLevelIndex;
                    }
                    if (data.remainingSeconds !== undefined &&
                        data.remainingSeconds >= 0 &&
                        data.remainingSeconds <= LEVEL_DURATION_SECONDS) {
                        remainingSeconds = data.remainingSeconds;
                    }
                    if (data.players && Array.isArray(data.players)) {
                        players = data.players.map(p => ({
                            id: p.id || generateId(),
                            name: p.name || '选手',
                            avatar: p.avatar || '',
                            championships: typeof p.championships === 'number' ? Math.max(0, p
                                .championships) : 0,
                        }));
                        sortPlayersByChampionships();
                    }
                    return true;
                } catch (e) {
                    console.warn('加载数据失败:', e.message);
                    return false;
                }
            }

            function generateId() {
                return 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
            }

            // ==================== 排序 ====================
            function sortPlayersByChampionships() {
                players.sort((a, b) => b.championships - a.championships);
            }

            // ==================== UI 更新 ====================
            function updateBlindsDisplay() {
                const levelData = BLIND_LEVELS[currentLevelIndex];
                $levelNumber.textContent = levelData.level;
                $blindsValue.textContent = `${levelData.small.toLocaleString()} / ${levelData.big.toLocaleString()}`;
                // 更新文档标题
                document.title = `L${levelData.level} ${levelData.small}/${levelData.big} - All in Night`;
            }

            function updateTimerDisplay() {
                const mins = Math.floor(remainingSeconds / 60);
                const secs = remainingSeconds % 60;
                $timerValue.textContent =
                    String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');

                // 警告状态
                $timerValue.classList.remove('warning', 'danger');
                if (isRunning) {
                    if (remainingSeconds <= 30 && remainingSeconds > 10) {
                        $timerValue.classList.add('warning');
                    } else if (remainingSeconds <= 10) {
                        $timerValue.classList.add('danger');
                    }
                }
            }

            function updateStartButton() {
                if (isRunning) {
                    $btnStart.textContent = '⏸ 暂停';
                    $btnStart.classList.add('running');
                } else {
                    $btnStart.textContent = '▶ 开始';
                    $btnStart.classList.remove('running');
                }
            }

            function renderPlayerList() {
                $playerList.innerHTML = '';
                if (players.length === 0) {
                    $playerList.innerHTML = '<div class="empty-state">暂无选手，点击"+ 添加选手"开始</div>';
                } else {
                    players.forEach((player, index) => {
                        const row = document.createElement('div');
                        row.className = 'player-row';
                        if (index === 0 && player.championships > 0 && players.length > 1) {
                            row.classList.add('top-player');
                        }

                        // 头像
                        const avatarWrap = document.createElement('div');
                        avatarWrap.className = 'player-avatar-wrap';
                        avatarWrap.setAttribute('data-player-id', player.id);
                        avatarWrap.title = '点击上传头像';
                        if (player.avatar) {
                            const img = document.createElement('img');
                            img.src = player.avatar;
                            img.alt = player.name;
                            avatarWrap.appendChild(img);
                        } else {
                            const placeholder = document.createElement('span');
                            placeholder.className = 'player-avatar-placeholder';
                            placeholder.textContent = player.name.charAt(0).toUpperCase();
                            avatarWrap.appendChild(placeholder);
                        }
                        const uploadHint = document.createElement('span');
                        uploadHint.className = 'player-avatar-upload-hint';
                        uploadHint.textContent = '📷';
                        avatarWrap.appendChild(uploadHint);
                        avatarWrap.addEventListener('click', () => triggerAvatarUpload(player.id));

                        // 信息区
                        const infoDiv = document.createElement('div');
                        infoDiv.className = 'player-info';

                        const nameInput = document.createElement('input');
                        nameInput.type = 'text';
                        nameInput.className = 'player-name-input';
                        nameInput.value = player.name;
                        nameInput.placeholder = '输入名字';
                        nameInput.maxLength = 20;
                        nameInput.addEventListener('input', () => {
                            player.name = nameInput.value || '选手';
                            saveData();
                        });
                        nameInput.addEventListener('blur', () => {
                            if (!player.name.trim()) {
                                player.name = '选手';
                                nameInput.value = '选手';
                            }
                            saveData();
                            renderPlayerList();
                        });

                        // 冠军控制
                        const champControl = document.createElement('div');
                        champControl.className = 'championship-control';

                        const trophyIcon = document.createElement('span');
                        trophyIcon.className = 'trophy-icon-sm';
                        trophyIcon.textContent = '🏆';

                        const champCount = document.createElement('span');
                        champCount.className = 'champ-count';
                        champCount.textContent = player.championships;

                        const btnMinus = document.createElement('button');
                        btnMinus.className = 'champ-btn';
                        btnMinus.textContent = '−';
                        btnMinus.title = '减少冠军次数';
                        btnMinus.addEventListener('click', (e) => {
                            e.stopPropagation();
                            if (player.championships > 0) {
                                player.championships--;
                                sortPlayersByChampionships();
                                saveData();
                                renderPlayerList();
                                updatePlayerCount();
                            }
                        });

                        const btnPlus = document.createElement('button');
                        btnPlus.className = 'champ-btn';
                        btnPlus.textContent = '+';
                        btnPlus.title = '增加冠军次数';
                        btnPlus.addEventListener('click', (e) => {
                            e.stopPropagation();
                            player.championships++;
                            sortPlayersByChampionships();
                            saveData();
                            renderPlayerList();
                            updatePlayerCount();
                        });

                        champControl.appendChild(trophyIcon);
                        champControl.appendChild(btnMinus);
                        champControl.appendChild(champCount);
                        champControl.appendChild(btnPlus);

                        infoDiv.appendChild(nameInput);
                        infoDiv.appendChild(champControl);

                        // 删除按钮
                        const btnDelete = document.createElement('button');
                        btnDelete.className = 'btn-delete-player';
                        btnDelete.textContent = '✕';
                        btnDelete.title = '删除选手';
                        btnDelete.addEventListener('click', (e) => {
                            e.stopPropagation();
                            if (confirm(`确定要删除选手"${player.name}"吗？此操作不可恢复。`)) {
                                players = players.filter(p => p.id !== player.id);
                                sortPlayersByChampionships();
                                saveData();
                                renderPlayerList();
                                updatePlayerCount();
                                showToast(`已删除选手: ${player.name}`);
                            }
                        });

                        row.appendChild(avatarWrap);
                        row.appendChild(infoDiv);
                        row.appendChild(btnDelete);
                        $playerList.appendChild(row);
                    });
                }
                updatePlayerCount();
            }

            function updatePlayerCount() {
                $playerCount.textContent = `${players.length} 位选手`;
            }

            function updateAllUI() {
                updateBlindsDisplay();
                updateTimerDisplay();
                updateStartButton();
                renderPlayerList();
            }

            // ==================== Toast ====================
            function showToast(message, isLevelUp = false) {
                if (toastTimeout) clearTimeout(toastTimeout);
                $toast.textContent = message;
                $toast.className = 'toast';
                if (isLevelUp) {
                    $toast.classList.add('level-up');
                }
                // 强制回流
                void $toast.offsetWidth;
                $toast.classList.add('show');
                toastTimeout = setTimeout(() => {
                    $toast.classList.remove('show');
                }, 2500);
            }

            // ==================== 升级覆盖层动画 ====================
            function showLevelUpOverlay() {
                const levelData = BLIND_LEVELS[currentLevelIndex];
                $levelUpBlinds.textContent = `${levelData.small.toLocaleString()} / ${levelData.big.toLocaleString()}`;
                $levelUpOverlay.classList.add('active');
                if (levelUpOverlayTimeout) clearTimeout(levelUpOverlayTimeout);
                levelUpOverlayTimeout = setTimeout(() => {
                    $levelUpOverlay.classList.remove('active');
                }, 2200);
            }

            // ==================== 语音播报 ====================
            function speakLevelUp(levelData) {
                try {
                    // 取消之前的语音
                    if (window.speechSynthesis) {
                        window.speechSynthesis.cancel();
                    }
                    const text =
                        `Level ${levelData.level}. Blinds are ${levelData.small} and ${levelData.big}.`;
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.9;
                    utterance.pitch = 1.05;
                    utterance.volume = 1.0;
                    // 在iOS上，有时需要延迟一点
                    setTimeout(() => {
                        window.speechSynthesis.speak(utterance);
                    }, 150);
                } catch (e) {
                    console.warn('语音播报失败:', e.message);
                }
            }

            function speakGameStart() {
                try {
                    if (window.speechSynthesis) {
                        window.speechSynthesis.cancel();
                    }
                    const levelData = BLIND_LEVELS[currentLevelIndex];
                    const text =
                        `Game started. Level ${levelData.level}, blinds ${levelData.small} and ${levelData.big}.`;
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.9;
                    utterance.pitch = 1.0;
                    utterance.volume = 1.0;
                    setTimeout(() => {
                        window.speechSynthesis.speak(utterance);
                    }, 100);
                } catch (e) {
                    console.warn('语音播报失败:', e.message);
                }
            }

            // ==================== 计时器逻辑 ====================
            function startTimer() {
                if (isRunning) return;
                if (remainingSeconds <= 0 && currentLevelIndex >= TOTAL_LEVELS - 1) {
                    showToast('已是最后级别，无法继续');
                    return;
                }
                if (remainingSeconds <= 0) {
                    // 时间到了但还没升级，先升级
                    advanceLevel();
                }
                isRunning = true;
                updateStartButton();
                updateTimerDisplay();
                saveData();

                // 首次启动时语音播报
                if (remainingSeconds === LEVEL_DURATION_SECONDS && currentLevelIndex === 0) {
                    speakGameStart();
                }

                timerInterval = setInterval(() => {
                    remainingSeconds--;
                    updateTimerDisplay();
                    if (remainingSeconds <= 0) {
                        clearInterval(timerInterval);
                        timerInterval = null;
                        isRunning = false;
                        updateStartButton();
                        if (currentLevelIndex < TOTAL_LEVELS - 1) {
                            advanceLevel();
                            // 自动开始下一级别
                            remainingSeconds = LEVEL_DURATION_SECONDS;
                            updateTimerDisplay();
                            saveData();
                            startTimer();
                        } else {
                            // 最后级别结束
                            showToast('🏁 所有级别已完成！', true);
                            speakFinalLevel();
                            remainingSeconds = 0;
                            updateTimerDisplay();
                            saveData();
                        }
                    }
                    // 每秒保存（节流）
                    if (remainingSeconds % 5 === 0 || remainingSeconds <= 10) {
                        saveData();
                    }
                }, 1000);
            }

            function pauseTimer() {
                if (!isRunning) return;
                clearInterval(timerInterval);
                timerInterval = null;
                isRunning = false;
                updateStartButton();
                updateTimerDisplay();
                saveData();
            }

            function resetTimer() {
                pauseTimer();
                currentLevelIndex = 0;
                remainingSeconds = LEVEL_DURATION_SECONDS;
                updateAllUI();
                saveData();
                showToast('已重置到第1级别');
            }

            function advanceLevel() {
                if (currentLevelIndex < TOTAL_LEVELS - 1) {
                    currentLevelIndex++;
                    remainingSeconds = LEVEL_DURATION_SECONDS;
                    const levelData = BLIND_LEVELS[currentLevelIndex];
                    updateBlindsDisplay();
                    updateTimerDisplay();
                    saveData();
                    showLevelUpOverlay();
                    showToast(
                        `⬆ 升至第${levelData.level}级别: ${levelData.small.toLocaleString()}/${levelData.big.toLocaleString()}`,
                        true);
                    speakLevelUp(levelData);
                } else {
                    showToast('已是最后级别');
                }
            }

            function skipLevel() {
                pauseTimer();
                if (currentLevelIndex < TOTAL_LEVELS - 1) {
                    advanceLevel();
                    updateAllUI();
                    saveData();
                } else {
                    showToast('已是最后级别，无法跳过');
                    resetTimer();
                }
            }

            function speakFinalLevel() {
                try {
                    if (window.speechSynthesis) {
                        window.speechSynthesis.cancel();
                    }
                    const text = 'Final level completed. Tournament finished.';
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.85;
                    utterance.pitch = 1.0;
                    utterance.volume = 1.0;
                    setTimeout(() => {
                        window.speechSynthesis.speak(utterance);
                    }, 200);
                } catch (e) {
                    console.warn('语音播报失败:', e.message);
                }
            }

            // ==================== 头像上传 ====================
            function triggerAvatarUpload(playerId) {
                editingAvatarForPlayerId = playerId;
                $avatarFileInput.value = '';
                $avatarFileInput.click();
            }

            function handleAvatarFileSelect(event) {
                const file = event.target.files && event.target.files[0];
                if (!file || !editingAvatarForPlayerId) return;

                if (!file.type.startsWith('image/')) {
                    showToast('请选择图片文件');
                    editingAvatarForPlayerId = null;
                    return;
                }

                if (file.size > 10 * 1024 * 1024) {
                    showToast('图片大小不能超过10MB');
                    editingAvatarForPlayerId = null;
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    compressImage(e.target.result, 200, 200, 0.65, function(compressedBase64) {
                        const player = players.find(p => p.id === editingAvatarForPlayerId);
                        if (player) {
                            player.avatar = compressedBase64;
                            saveData();
                            renderPlayerList();
                            showToast('头像已更新 ✓');
                        }
                        editingAvatarForPlayerId = null;
                    });
                };
                reader.onerror = function() {
                    showToast('读取图片失败');
                    editingAvatarForPlayerId = null;
                };
                reader.readAsDataURL(file);
            }

            function compressImage(base64, maxWidth, maxHeight, quality, callback) {
                const img = new Image();
                img.onload = function() {
                    let w = img.width;
                    let h = img.height;
                    if (w > maxWidth || h > maxHeight) {
                        const ratio = Math.min(maxWidth / w, maxHeight / h);
                        w = Math.round(w * ratio);
                        h = Math.round(h * ratio);
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = w;
                    canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    const compressed = canvas.toDataURL('image/jpeg', quality);
                    callback(compressed);
                };
                img.onerror = function() {
                    callback(base64); // 压缩失败返回原图
                };
                img.src = base64;
            }

            // ==================== 选手管理 ====================
            function addPlayer() {
                const defaultNames = [
                    '选手A', '选手B', '选手C', '选手D', '选手E',
                    '玩家1', '玩家2', '玩家3', '玩家4', '玩家5',
                ];
                const usedNames = new Set(players.map(p => p.name));
                let newName = '新选手';
                for (const name of defaultNames) {
                    if (!usedNames.has(name)) {
                        newName = name;
                        break;
                    }
                }
                if (usedNames.has(newName)) {
                    newName = '选手' + (players.length + 1);
                }

                const newPlayer = {
                    id: generateId(),
                    name: newName,
                    avatar: '',
                    championships: 0,
                };
                players.push(newPlayer);
                sortPlayersByChampionships();
                saveData();
                renderPlayerList();
                showToast(`已添加: ${newName}`);
                // 滚动到底部
                setTimeout(() => {
                    $playerList.scrollTop = $playerList.scrollHeight;
                }, 200);
            }

            // ==================== 页面可见性处理 ====================
            function handleVisibilityChange() {
                if (document.hidden) {
                    // 页面隐藏时记录时间
                    if (isRunning && timerInterval) {
                        document._hiddenAt = Date.now();
                    }
                } else {
                    // 页面重新可见时修正倒计时
                    if (isRunning && document._hiddenAt) {
                        const elapsed = Math.floor((Date.now() - document._hiddenAt) / 1000);
                        if (elapsed > 0) {
                            remainingSeconds = Math.max(0, remainingSeconds - elapsed);
                            updateTimerDisplay();
                            if (remainingSeconds <= 0) {
                                clearInterval(timerInterval);
                                timerInterval = null;
                                isRunning = false;
                                updateStartButton();
                                if (currentLevelIndex < TOTAL_LEVELS - 1) {
                                    advanceLevel();
                                    remainingSeconds = LEVEL_DURATION_SECONDS;
                                    updateTimerDisplay();
                                    saveData();
                                    startTimer();
                                } else {
                                    remainingSeconds = 0;
                                    updateTimerDisplay();
                                    saveData();
                                    speakFinalLevel();
                                    showToast('🏁 所有级别已完成！', true);
                                }
                            }
                            saveData();
                        }
                        document._hiddenAt = null;
                    }
                }
            }

            // ==================== 事件绑定 ====================
            $btnStart.addEventListener('click', () => {
                if (isRunning) {
                    pauseTimer();
                } else {
                    startTimer();
                }
            });

            $btnReset.addEventListener('click', () => {
                if (confirm('确定要重置到第1级别吗？当前进度将丢失。')) {
                    resetTimer();
                }
            });

            $btnSkip.addEventListener('click', () => {
                if (isRunning) {
                    if (confirm('确定要跳过当前级别吗？')) {
                        skipLevel();
                    }
                } else {
                    skipLevel();
                }
            });

            $btnAddPlayer.addEventListener('click', () => {
                addPlayer();
            });

            $avatarFileInput.addEventListener('change', handleAvatarFileSelect);

            document.addEventListener('visibilitychange', handleVisibilityChange);

            // 键盘快捷键
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' && e.target.type === 'text') return;
                switch (e.key.toLowerCase()) {
                    case ' ':
                        e.preventDefault();
                        if (isRunning) pauseTimer();
                        else startTimer();
                        break;
                    case 'r':
                        if (!e.ctrlKey && !e.metaKey) {
                            e.preventDefault();
                            if (confirm('重置到第1级别？')) resetTimer();
                        }
                        break;
                    case 's':
                        if (!e.ctrlKey && !e.metaKey) {
                            e.preventDefault();
                            skipLevel();
                        }
                        break;
                    case 'a':
                        if (!e.ctrlKey && !e.metaKey) {
                            e.preventDefault();
                            addPlayer();
                        }
                        break;
                }
            });

            // ==================== 初始化 ====================
            function init() {
                const loaded = loadData();
                if (!loaded) {
                    // 首次使用，添加默认选手
                    players = [
                        { id: generateId(), name: '选手1', avatar: '', championships: 2 },
                        { id: generateId(), name: '选手2', avatar: '', championships: 1 },
                        { id: generateId(), name: '选手3', avatar: '', championships: 0 },
                    ];
                    sortPlayersByChampionships();
                    currentLevelIndex = 0;
                    remainingSeconds = LEVEL_DURATION_SECONDS;
                    saveData();
                }
                // 确保倒计时在合理范围
                if (remainingSeconds > LEVEL_DURATION_SECONDS) {
                    remainingSeconds = LEVEL_DURATION_SECONDS;
                }
                if (remainingSeconds < 0) remainingSeconds = 0;
                if (currentLevelIndex >= TOTAL_LEVELS) currentLevelIndex = TOTAL_LEVELS - 1;
                if (currentLevelIndex < 0) currentLevelIndex = 0;

                isRunning = false;
                updateAllUI();
                document._hiddenAt = null;

                console.log('🏆 All in Night - 德州扑克升盲应用已就绪');
                console.log(`   ${TOTAL_LEVELS}个级别 | 每级${LEVEL_DURATION_SECONDS / 60}分钟 | ${players.length}位选手`);
                console.log('   空格键: 开始/暂停 | R: 重置 | S: 跳过级别 | A: 添加选手');
            }

            init();

            // ==================== 页面卸载前保存 ====================
            window.addEventListener('beforeunload', () => {
                if (isRunning) {
                    pauseTimer();
                }
                saveData();
            });

            // 定期保存（每30秒）
            setInterval(() => {
                if (isRunning) {
                    saveData();
                }
            }, 30000);

            console.log('✅ All in Night 应用初始化完成');
        })();
    </script>
</body>
</html>
